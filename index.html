<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Ammu Molu ❤️</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --bg-gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Background */
        .heart-bg {
            position: absolute;
            top: -10%;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
            animation: float 10s linear infinite;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Glassmorphism Card */
        #container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 400px;
            z-index: 10;
        }

        .main-icon {
            font-size: 5rem;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            margin-bottom: 20px;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            font-size: 1.8rem;
            margin: 0;
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            position: relative;
            height: 60px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        #yesBtn {
            background: var(--primary);
            color: white;
            z-index: 20;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        #noBtn {
            background: #ffffff;
            color: #6c757d;
            position: absolute;
        }

        .celebration { display: none; }
        
        .celebration h1 {
            font-size: 2rem;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="main-content">
            <div class="main-icon">💍</div>
            <h1>To My Love Ammu Molu ❤️</h1>
            <p style="color: white; font-weight: 600; margin-top: 10px;">Will you be my Valentine?</p>
            <div class="buttons">
                <button id="yesBtn">YES!</button>
                <button id="noBtn" style="left: 60%;">No</button>
            </div>
        </div>

        <div id="celebration" class="celebration">
            <div class="main-icon">👩‍❤️‍💋‍👨</div>
            <h1>YAY! You're mine forever!</h1>
            <p style="color: white; font-size: 1.2rem; margin-top: 15px;">I love you so much, Ammu Molu! ❤️✨</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainContent = document.getElementById('main-content');
        const celebration = document.getElementById('celebration');
