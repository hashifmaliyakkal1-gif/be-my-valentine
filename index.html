<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To My Love Ammu Molu ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        /* Floating Hearts */
        .heart-bg {
            position: absolute;
            top: -10%;
            pointer-events: none; /* CRITICAL: This stops hearts from blocking buttons */
            z-index: 0;
            animation: float 8s linear infinite;
            font-size: 24px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        #container {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 350px;
            z-index: 100;
        }

        .main-icon { font-size: 5rem; margin-bottom: 10px; }
        h1 { color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2); font-size: 1.7rem; margin: 10px 0; }
        p { color: white; font-weight: bold; font-size: 1.1rem; }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            position: relative;
            height: 60px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
            z-index: 101;
        }

        #noBtn {
            background: white;
            color: #6c757d;
            position: absolute;
            z-index: 101;
            transition: left 0.1s, top 0.1s;
        }

        .celebration { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="main-content">
            <div class="main-icon">💍</div>
            <h1>To My Love Ammu Molu ❤️</h1>
            <p>Will you be my Valentine?</p>
            <div class="buttons">
                <button id="yesBtn">YES!</button>
                <button id="noBtn" style="left: 55%;">No</button>
            </div>
        </div>

        <div id="celebration" class="celebration">
            <div class="main-icon">👩‍❤️‍💋‍👨</div>
            <h1>YAY! You're mine forever!</h1>
            <p>I love you so much, Ammu Molu! ❤️✨</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainContent = document.getElementById('main-content');
        const celebration = document.getElementById('celebration');

        // Background Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        setInterval(createHeart, 500);

        // Move the "No" button
        const moveButton = (e) => {
            if (e) e.preventDefault();
            const padding = 20;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = (Math.random() * maxX) + 'px';
            noBtn.style.top = (Math.random() * maxY) + 'px';
        };

        // Important: Touchstart for phones, Mouseover for computers
        noBtn.addEventListener('touchstart', moveButton);
        noBtn.addEventListener('mouseover', moveButton);

        // Success Action
        yesBtn.addEventListener('click', () => {
            mainContent.style.display = 'none';
            celebration.style.display = 'block';
            document.body.style.background = '#ff4d6d';
            // Celebration confetti hearts!
            setInterval(createHeart, 100);
        });
    </script>
</body>
</html>
